<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ben Currie // crevex.tech</title>
    <meta
      name="description"
      content="AI Research & Distributed Systems Engineer. Stewarding technology for the Kingdom. An interactive terminal portfolio — type 'help' to begin."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- ASCII banner (hidden source, cloned by JS to avoid escaping) -->
    <pre id="asciiBanner" hidden>
  ___ _ __ _____   _______  __
 / __| '__/ _ \ \ / / _ \ \/ /
| (__| | |  __/\ V /  __/>  <
 \___|_|  \___| \_/ \___/_/\_\
</pre
    >

    <div class="screen">
      <div class="titlebar">
        <span class="dot r"></span><span class="dot y"></span
        ><span class="dot g"></span>
        <span class="title">ben@crevex: ~</span>
        <span class="status">online</span>
      </div>

      <div class="terminal" id="terminal">
        <div id="output"></div>
        <div class="input-line">
          <span class="ps1"
            ><span class="u">ben</span>@<span class="p">crevex</span>:~$</span
          >
          <input
            id="cmd"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
            aria-label="terminal input"
          />
        </div>
      </div>

      <div class="chips" id="chips">
        <button class="chip" data-cmd="help">
          <span class="d">$</span> help
        </button>
        <button class="chip" data-cmd="about">
          <span class="d">$</span> about
        </button>
        <button class="chip" data-cmd="projects">
          <span class="d">$</span> projects
        </button>
        <button class="chip" data-cmd="writing">
          <span class="d">$</span> writing
        </button>
        <button class="chip" data-cmd="skills">
          <span class="d">$</span> skills
        </button>
        <button class="chip" data-cmd="contact">
          <span class="d">$</span> contact
        </button>
        <button class="chip" data-cmd="neofetch">
          <span class="d">$</span> neofetch
        </button>
        <button class="chip" data-cmd="clear">
          <span class="d">$</span> clear
        </button>
      </div>
      <div class="bottom_links">
        <a
          href="https://github.com/BenCurrie42/crevex.tech"
          class="bottom_links"
          >Source code</a
        >
      </div>
    </div>
    <script src="main.js"></script>
  <link rel="stylesheet" href="styles.css" /> 
  </body>
</html>
